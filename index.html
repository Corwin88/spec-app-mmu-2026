<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Соответствия">
<title>Соответствия специальностей</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Экран блокировки -->
<div id="lockScreen" class="screen">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <h1>Доступ ограничен</h1>
    <p class="hint">Введите пароль для входа</p>
    <input id="passwordInput" type="password" inputmode="numeric" autocomplete="off" placeholder="Пароль" />
    <button id="unlockBtn">Войти</button>
    <p id="lockError" class="error"></p>
  </div>
</div>

<!-- Основной экран -->
<div id="mainScreen" class="screen hidden">
  <header class="app-header">
    <h1>Соответствия специальностей</h1>
    <button id="lockAgainBtn" title="Заблокировать" aria-label="Заблокировать">🔒</button>
  </header>

  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Код или название специальности…" autocomplete="off" />
    <button id="clearBtn" class="clear-btn hidden" aria-label="Очистить">✕</button>
  </div>

  <div id="suggestions" class="suggestions hidden"></div>

  <div id="resultArea" class="result-area">
    <div id="emptyState" class="empty-state">
      <p>Начните вводить код или название специальности СПО, чтобы найти подходящее направление подготовки.</p>
    </div>
    <div id="resultCard" class="result-card hidden"></div>
  </div>

  <footer class="app-footer">
    <span id="statusLine"></span>
  </footer>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
